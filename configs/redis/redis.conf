## Redis persistence profile for demo + single-node perf tests
##
## Goals:
## - Keep configuration explicit and reviewable
## - Favor durability enough for demos (AOF everysec + periodic RDB)
## - Avoid surprises during load tests

bind 0.0.0.0
port 6379

protected-mode yes

## Memory
## Prefer setting maxmemory via env/args in production.
## maxmemory 0
maxmemory-policy noeviction

## Persistence (AOF + RDB)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes

## Data directory (K8s StatefulSet should mount a PVC here)
dir /data
dbfilename dump.rdb
appendfilename appendonly.aof

## Observability / ops
loglevel notice
databases 16

