services:
  redis:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.redis
    image: vote-redis:latest
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "redis123"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  grpcserver:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.grpcserver
    image: vote-grpcserver:latest
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9091"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "redis123"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9090:9090"
      - "9091:9091"

  httpserver:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.httpserver
    image: vote-httpserver:latest
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: "grpcserver:9090"
    depends_on:
      - grpcserver
    ports:
      - "8080:8080"

volumes:
  redis-data:
