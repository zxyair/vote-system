apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: voting-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: httpserver-service
            port:
              number: 8080