apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: vote-system
  labels:
    app: grafana
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
