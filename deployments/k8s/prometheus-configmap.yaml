apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: voting-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'voting-app-httpserver'
        static_configs:
          - targets: ['httpserver-service:8080']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'voting-app-grpcserver'
        static_configs:
          - targets: ['grpcserver-service:9090']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-service:6379']
        scrape_interval: 15s