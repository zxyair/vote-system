apiVersion: v1
kind: Service
metadata:
  name: grpcserver
  namespace: voting
  labels:
    app: grpcserver
spec:
  selector:
    app: grpcserver
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
    - name: metrics
      port: 2112
      targetPort: 2112
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpcserver
  namespace: voting
  labels:
    app: grpcserver
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpcserver
  template:
    metadata:
      labels:
        app: grpcserver
    spec:
      containers:
        - name: grpcserver
          image: voting/grpcserver:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: grpc
            - containerPort: 2112
              name: metrics
          env:
            - name: GRPC_ADDR
              value: ":9090"
            - name: METRICS_ADDR
              value: ":2112"
            - name: REDIS_ADDR
              value: "redis.voting.svc.cluster.local:6379"
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: httpserver
  namespace: voting
  labels:
    app: httpserver
spec:
  selector:
    app: httpserver
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpserver
  namespace: voting
  labels:
    app: httpserver
spec:
  replicas: 3
  selector:
    matchLabels:
      app: httpserver
  template:
    metadata:
      labels:
        app: httpserver
    spec:
      containers:
        - name: httpserver
          image: voting/httpserver:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: GRPC_ADDR
              value: "grpcserver.voting.svc.cluster.local:9090"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 256Mi

