apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: httpserver
  namespace: voting
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: httpserver
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grpcserver
  namespace: voting
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grpcserver
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

